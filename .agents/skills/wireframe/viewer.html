<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="wf-generated" content="">
  <title>Wireframe Viewer</title>
  <style>
*,*::before,*::after{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:#c8d0db;color:#1b1f24;font-size:14px}
button{font:inherit}
.app{display:flex;height:100vh;overflow:hidden}
.nav{width:236px;flex:0 0 auto;background:#fff;border-right:1px solid #d0d7e0;display:flex;flex-direction:column}
.nav-head{padding:16px 14px 12px;border-bottom:1px solid #d0d7e0}
.brand{font-weight:800;font-size:15px}
.sub{margin-top:3px;color:#68707c;font-size:11px}
.nav-list{overflow:auto;padding:8px}
.group{margin:14px 6px 5px;color:#68707c;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.nav-btn{width:100%;border:0;background:transparent;text-align:left;padding:8px 10px;border-radius:7px;cursor:pointer;color:#1b1f24}
.nav-btn:hover{background:#f0f4f8}
.nav-btn.active{background:#e8f0ff;color:#2563eb;font-weight:700}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:52px;flex:0 0 auto;background:#fff;border-bottom:1px solid #d0d7e0;display:flex;align-items:center;gap:12px;padding:8px 14px}
.doc-meta{flex:1;min-width:0}
.doc-title{font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-path{font-size:11px;color:#68707c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.controls{display:flex;align-items:center;gap:8px}
.seg{display:flex;border:1px solid #d0d7e0;border-radius:7px;overflow:hidden}
.seg button{border:0;background:#fff;padding:5px 10px;cursor:pointer}
.seg button.active{background:#1b1f24;color:#fff}
.range{display:flex;align-items:center;gap:6px;color:#68707c;font-size:11px}
.range input{width:110px;accent-color:#2563eb}
.work{flex:1;min-height:0;display:flex;gap:10px;padding:12px;overflow:hidden}
.canvas{flex:1;min-width:0;overflow:auto;border:1px solid #d0d7e0;border-radius:8px;background:#c8d0db;padding:44px}
.frame{width:960px;min-height:680px;margin:0 auto;background:#fff;border:1px solid #c0cad8;border-radius:8px;box-shadow:0 4px 32px rgba(0,0,0,.15);overflow:hidden;transform-origin:top center}
.frame.component{padding:18px}
.source{width:310px;flex:0 0 auto;background:#fff;border:1px solid #d0d7e0;border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.source-label{padding:9px 12px;border-bottom:1px solid #d0d7e0;color:#68707c;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.source pre{margin:0;padding:12px;overflow:auto;white-space:pre-wrap;word-break:break-word;font-family:"Cascadia Code",Consolas,monospace;font-size:11.5px;line-height:1.55}

.wf-screen{min-height:680px;background:#fff;display:flex;flex-direction:column}
.wf-header{height:58px;flex:0 0 auto;background:#f5f7fa;border-bottom:1.5px solid #dde3ec;display:flex;align-items:center;gap:10px;padding:0 16px}
.wf-icon{width:24px;height:24px;border-radius:5px;background:#c0cad8;flex:0 0 auto}
.wf-logo{background:#1b1f24;color:#fff;border-radius:5px;padding:6px 10px;font-size:12px;font-weight:850;letter-spacing:.03em}
.wf-search{height:38px;min-width:190px;flex:1;border:1.5px solid #c0cad8;border-radius:19px;background:#fff;display:flex;align-items:center;gap:8px;padding:0 13px;color:#9aa4b2;font-size:13px}
.wf-search::before{content:"";width:13px;height:13px;border:2px solid #9aa4b2;border-radius:50%;display:block;box-shadow:8px 8px 0 -6px #9aa4b2}
.wf-button{height:36px;border:0;border-radius:7px;background:#2563eb;color:#fff;padding:0 14px;font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}
.wf-button.secondary{background:#fff;color:#3c4452;border:1.5px solid #c0cad8}
.wf-shell{flex:1;min-height:0;display:grid;grid-template-columns:200px minmax(0,1fr) 320px;overflow:hidden}
.wf-sidebar{background:#f5f7fa;border-right:1.5px solid #dde3ec;padding:12px;display:flex;flex-direction:column;gap:10px}
.wf-nav-lines{display:flex;flex-direction:column;gap:8px}
.wf-nav-line{height:28px;border-radius:6px;background:#e4e9f0}
.wf-badge{align-self:flex-start;min-width:28px;height:22px;border-radius:999px;background:#e8f0ff;color:#2563eb;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;padding:0 8px}
.wf-workspace{min-width:0;display:flex;flex-direction:column;gap:12px;padding:16px;overflow:auto}
.wf-pane{min-width:0;background:#fafbfc;border-left:1.5px solid #dde3ec;padding:12px;display:flex;flex-direction:column;gap:12px;overflow:auto}
.wf-toolbar{min-height:56px;border:1.5px solid #dde3ec;border-radius:8px;background:#fff;display:flex;align-items:center;gap:10px;padding:10px 12px;flex-wrap:wrap}
.wf-toolbar-title{font-size:16px;font-weight:800;margin-right:auto}
.wf-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:auto}
.wf-tabs{min-height:36px;border:1.5px solid #dde3ec;border-radius:8px;background:#f5f7fa;padding:3px;display:flex;gap:4px;align-items:center}
.wf-tab{height:28px;min-width:72px;border-radius:6px;background:#dde3ec}
.wf-tab.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.wf-section{border:1.5px dashed #c0cad8;border-radius:8px;background:#fafbfc;padding:12px;display:flex;flex-direction:column;gap:10px}
.wf-section-label{font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.06em;color:#8892a4}
.wf-title{font-size:18px;font-weight:850;line-height:1.25}
.wf-text{font-size:14px;color:#3c4452;line-height:1.45}
.wf-caption{font-size:12px;color:#68707c;line-height:1.35}
.wf-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.wf-card{background:#fff;border:1.5px solid #dde3ec;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:12px;display:flex;flex-direction:column;gap:8px}
.wf-list{background:#fff;border:1.5px solid #dde3ec;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.wf-list-row{min-height:48px;border-bottom:1px solid #eef2f6;display:flex;align-items:center;gap:10px;padding:8px 12px}
.wf-list-row:last-child{border-bottom:0}
.wf-dot{width:8px;height:8px;border-radius:50%;background:#c0cad8}
.wf-avatar{width:52px;height:52px;border-radius:50%;background:#dde3ec;border:1.5px solid #c0cad8}
.wf-chip{display:inline-flex;align-items:center;height:22px;border-radius:999px;background:#e8f0ff;color:#2563eb;padding:0 8px;font-size:11px;font-weight:800}
.wf-check{width:18px;height:18px;border-radius:4px;border:2px solid #c0cad8;background:#fff;flex:0 0 auto}
.wf-table{background:#fff;border:1.5px solid #dde3ec;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.wf-table-row{display:grid;grid-template-columns:40px 1.4fr 1fr 1fr 112px 44px;gap:10px;align-items:center;min-height:48px;padding:8px 12px;border-bottom:1px solid #eef2f6}
.wf-table-row:last-child{border-bottom:0}
.wf-table-row.header{background:#f5f7fa;font-weight:800;color:#68707c;font-size:12px}
.wf-footer{height:42px;border-top:1.5px solid #dde3ec;background:#f5f7fa;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.wf-placeholder{height:14px;max-width:220px;border-radius:999px;background:#dde3ec}
.wf-mobile-flow{display:none;border-top:1px dashed #c0cad8;padding:12px;gap:10px;background:#fafbfc}
.wf-step{height:42px;border-radius:8px;background:#fff;border:1px solid #dde3ec;display:flex;align-items:center;justify-content:center;color:#68707c;font-weight:700}
.mobile .wf-shell{grid-template-columns:1fr}
.mobile .wf-sidebar,.mobile .wf-pane{display:none}
.mobile .wf-mobile-flow{display:flex;flex-direction:column}
.mobile .wf-table-row{grid-template-columns:28px 1fr 76px}
.mobile .wf-table-row>*:nth-child(n+4){display:none}
  </style>
</head>
<body>
<div class="app">
  <aside class="nav">
    <div class="nav-head">
      <div class="brand">Wireframe Viewer</div>
      <div class="sub">Direct STN prototype</div>
    </div>
    <div class="nav-list" id="nav"></div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="doc-meta">
        <div class="doc-title" id="doc-title"></div>
        <div class="doc-path" id="doc-path"></div>
      </div>
      <div class="controls">
        <div class="seg">
          <button id="desktop" class="active" type="button">Desktop</button>
          <button id="mobile" type="button">Mobile</button>
          <button id="fit" type="button">Fit</button>
        </div>
        <label class="range"><input id="width" type="range" min="360" max="1280" step="20" value="960"><span id="width-label">960px</span></label>
      </div>
    </div>
    <div class="work">
      <section class="canvas"><div class="frame" id="frame"></div></section>
      <aside class="source"><div class="source-label">STN Source</div><pre id="source"></pre></aside>
    </div>
  </main>
</div>

<script id="wf-docs-tpl" type="application/json">[]</script>
<script id="wf-data" type="application/json">[]</script>
<script>
const docs=JSON.parse(document.getElementById('wf-docs-tpl').textContent);
const nav=document.getElementById('nav');
const frame=document.getElementById('frame');
const source=document.getElementById('source');
const title=document.getElementById('doc-title');
const pathEl=document.getElementById('doc-path');
const desktop=document.getElementById('desktop');
const mobile=document.getElementById('mobile');
const fit=document.getElementById('fit');
const width=document.getElementById('width');
const widthLabel=document.getElementById('width-label');
let current=docs.findIndex(d=>d.kind==='screen');
if(current<0)current=0;
function label(kind){return kind==='global'?'Global':kind==='screen'?'Screens':'Components'}
function renderNav(){
  nav.innerHTML='';
  ['global','screen','component'].forEach(kind=>{
    const items=docs.map((d,i)=>({d,i})).filter(x=>x.d.kind===kind);
    if(!items.length)return;
    const g=document.createElement('div');g.className='group';g.textContent=label(kind);nav.appendChild(g);
    items.forEach(({d,i})=>{
      const b=document.createElement('button');b.className='nav-btn';b.type='button';b.textContent=d.name;b.dataset.index=i;
      b.addEventListener('click',()=>select(i));nav.appendChild(b);
    });
  });
}
function select(i){
  const d=docs[i];
  if(!d){
    title.textContent='No design files found';pathEl.textContent='';source.textContent='';
    frame.className='frame';frame.innerHTML='<div class="wf-screen"><div class="wf-workspace"><div class="wf-section"><div class="wf-section-label">Empty</div><div class="wf-text">No STN documents were provided.</div></div></div></div>';
    return;
  }
  current=i;title.textContent=d.name;pathEl.textContent=d.path;source.textContent=d.source;
  frame.className='frame '+(d.kind==='component'?'component':'');
  frame.innerHTML=d.html;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',Number(b.dataset.index)===i));
}
function setMode(mode){
  frame.classList.toggle('mobile',mode==='mobile');
  desktop.classList.toggle('active',mode==='desktop');
  mobile.classList.toggle('active',mode==='mobile');
}
desktop.addEventListener('click',()=>{width.value=960;widthLabel.textContent='960px';frame.style.width='960px';frame.style.transform='';setMode('desktop')});
mobile.addEventListener('click',()=>{width.value=390;widthLabel.textContent='390px';frame.style.width='390px';frame.style.transform='';setMode('mobile')});
fit.addEventListener('click',()=>{const host=document.querySelector('.canvas');const scale=Math.min(1,(host.clientWidth-88)/frame.offsetWidth);frame.style.transform='scale('+Math.max(.35,scale).toFixed(2)+')'});
width.addEventListener('input',()=>{frame.style.width=width.value+'px';widthLabel.textContent=width.value+'px';setMode(Number(width.value)<560?'mobile':'desktop')});
renderNav();
select(current);
</script>
</body>
</html>
