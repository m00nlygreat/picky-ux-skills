<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wireframe Viewer</title>
<style>
:root {
  --nav-w: 260px;
  --bg: #f0f2f5;
  --panel: #ffffff;
  --ink: #1b1f24;
  --muted: #68707c;
  --line: #d0d7e0;
  --accent: #2563eb;
  --accent-soft: #e8f0ff;
  --bar: #e8eaf0;
  --bar-border: #c8cdd8;
  --btn-bg: #f3f4f6;
  --btn-border: #b8c0cc;
  --input-bg: #ffffff;
  --badge-bg: #e0f2fe;
  --badge-ink: #0369a1;
  --metric-bg: #f8fafc;
  --sidebar-bg: #f3f4f6;
  --card-bg: #ffffff;
  --shadow: 0 1px 3px rgba(0,0,0,.10);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Inter, "Pretendard", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
}

/* ── Viewer shell ──────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--nav-w) 1fr;
  min-height: 100vh;
  transition: grid-template-columns .2s ease;
}
.sidebar {
  border-right: 1px solid var(--line); background: var(--panel);
  padding: 20px 14px; overflow-y: auto; overflow-x: hidden;
  min-width: 0; transition: padding .2s ease;
}
.brand { margin: 0 0 2px; font-size: 17px; font-weight: 700; white-space: nowrap; }
.sub { margin: 0 0 16px; color: var(--muted); font-size: 11px; white-space: nowrap; }
.group-title {
  margin: 16px 8px 6px; color: var(--muted); font-size: 10px;
  font-weight: 700; letter-spacing: .08em; text-transform: uppercase; white-space: nowrap;
}
.nav-button {
  width: 100%; border: 0; border-radius: 7px; background: transparent;
  color: var(--ink); display: block; margin: 2px 0; padding: 8px 10px;
  text-align: left; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-button:hover { background: #eef1f6; }
.nav-button.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

.main { min-width: 0; padding: 16px 20px 20px; display: flex; flex-direction: column; }

/* toolbar */
.toolbar-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.title { flex: 1; min-width: 0; }
.title h2 { margin: 0; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.title p { margin: 2px 0 0; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.controls { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* icon toggle buttons */
.icon-btn {
  border: 1px solid var(--line); border-radius: 7px;
  background: var(--panel); padding: 5px 10px; cursor: pointer;
  color: var(--muted); line-height: 1; display: inline-flex; align-items: center;
  gap: 5px; font-size: 12px; white-space: nowrap;
}
.icon-btn:hover { background: #eef1f6; color: var(--ink); }
.icon-btn.on { background: var(--accent-soft); color: var(--accent); border-color: #c7d9ff; }

/* preset seg */
.seg {
  border: 1px solid var(--line); border-radius: 7px; background: var(--panel);
  display: flex; padding: 2px;
}
.seg button {
  border: 0; border-radius: 5px; background: transparent;
  cursor: pointer; padding: 4px 9px; font-size: 11px; color: var(--muted); white-space: nowrap;
}
.seg button.active { background: var(--ink); color: white; }

/* width slider control */
.width-ctrl {
  display: flex; align-items: center; gap: 7px;
  border: 1px solid var(--line); border-radius: 7px;
  background: var(--panel); padding: 4px 10px;
}
.width-ctrl input[type=range] {
  width: 110px; accent-color: var(--accent); cursor: pointer; margin: 0;
  height: 4px;
}
.w-label { font-size: 11px; color: var(--muted); min-width: 40px; text-align: right; }

/* workspace */
.workspace-viewer {
  display: grid;
  grid-template-columns: 1fr minmax(240px, 360px);
  gap: 12px;
  flex: 1;
}
.workspace-viewer.source-off { grid-template-columns: 1fr; }

.preview, .source-panel {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; min-width: 0;
}
.preview { padding: 16px; overflow: auto; }
.source-panel { overflow: hidden; }
.source-panel.hidden { display: none; }
.source-panel pre {
  margin: 0; height: calc(100vh - 130px); overflow: auto;
  padding: 14px; white-space: pre-wrap; font-size: 11px; line-height: 1.55;
  color: var(--muted);
}

/* wireframe frame */
.frame {
  background: #f7f8fa; border: 1px solid #ccd2dc; border-radius: 10px;
  margin: 0 auto; min-height: 560px; overflow: hidden;
  transition: max-width .15s ease;
  width: 100%;
}
.wf-empty { color: var(--muted); padding: 24px; text-align: center; }

/* ── Layout shells ─────────────────────────────────────────────────── */
.wf-screen { display: flex; flex-direction: column; height: 100%; min-height: 560px; }
.wf-layout { display: flex; flex: 1; overflow: hidden; }
.wf-workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.wf-sidebar {
  background: var(--sidebar-bg); padding: 10px 8px;
  display: flex; flex-direction: column; gap: 6px;
  flex-shrink: 0; overflow-y: auto;
}
.wf-sidebar-left { width: 180px; border-right: 1px solid var(--line); }
.wf-sidebar-right { width: 220px; border-left: 1px solid var(--line); }
.wf-sidebar-label { color: var(--muted); font-size: 11px; padding: 4px 6px; }
.wf-stepview {
  flex: 1; border: 1px dashed var(--line); border-radius: 6px; margin: 4px; padding: 8px;
}
.wf-stepview-label {
  font-size: 10px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px;
}

/* ── Navigation bars ───────────────────────────────────────────────── */
.wf-topbar {
  background: var(--bar); border-bottom: 1px solid var(--bar-border);
  padding: 0 14px; height: 48px; display: flex; align-items: center;
  gap: 8px; flex-shrink: 0;
}
.wf-topbar-brand { font-weight: 700; font-size: 15px; margin-right: 8px; }
.wf-navbar {
  background: var(--bar); border-bottom: 1px solid var(--bar-border);
  padding: 0 12px; height: 40px; display: flex; align-items: center; gap: 6px;
}
.wf-bottombar {
  background: var(--bar); border-top: 1px solid var(--bar-border);
  padding: 0 12px; height: 48px; display: flex; align-items: center;
  gap: 8px; justify-content: space-around; flex-shrink: 0;
}
.wf-toolbar {
  background: var(--panel); border-bottom: 1px solid var(--line);
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.wf-toolbar-title { font-weight: 600; }
.wf-filterbar {
  background: #fafbfc; border-bottom: 1px solid var(--line);
  padding: 6px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.wf-navmenu { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; }
.wf-navitem {
  padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--ink);
}
.wf-navitem:hover { background: #e8eaf0; }
.wf-header-actions { display: flex; gap: 6px; align-items: center; }

/* ── Tabs ──────────────────────────────────────────────────────────── */
.wf-tabgroup {
  display: flex; gap: 2px; padding: 4px 6px;
  border-bottom: 1px solid var(--line); background: var(--panel); flex-shrink: 0;
}
.wf-tab {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--btn-bg);
  padding: 5px 14px; cursor: pointer; font-size: 12px; color: var(--muted);
}
.wf-tab.wf-tab-active {
  background: var(--panel); color: var(--accent); border-color: var(--accent); font-weight: 600;
}

/* ── Buttons ───────────────────────────────────────────────────────── */
.wf-btn {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--btn-bg);
  padding: 6px 14px; cursor: pointer; font-size: 12px; color: var(--ink); white-space: nowrap;
}
.wf-btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.wf-btn-secondary { background: var(--panel); color: var(--accent); border-color: var(--accent); }
.wf-btn-ghost { background: transparent; border-color: transparent; color: var(--muted); }
.wf-btn-tool {
  background: var(--btn-bg); color: var(--muted); border-color: var(--btn-border);
  padding: 4px 10px; font-size: 11px;
}
.wf-btn-active { background: var(--accent); color: #fff; }
.wf-btn-sm { padding: 3px 8px; font-size: 11px; }
.wf-btn-icon {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--btn-bg);
  width: 30px; height: 30px; display: inline-flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 13px; color: var(--muted); flex-shrink: 0;
}
.wf-menu-trigger {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--btn-bg);
  padding: 4px 8px; cursor: pointer; font-size: 12px; color: var(--muted);
}

/* ── Inputs ────────────────────────────────────────────────────────── */
.wf-input {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--input-bg);
  padding: 6px 10px; display: flex; align-items: center; gap: 6px; min-width: 140px;
}
.wf-input-search { background: #f8fafc; }
.wf-search-icon { color: var(--muted); font-size: 15px; }
.wf-placeholder { color: var(--muted); font-size: 12px; }
.wf-select {
  border: 1px solid var(--btn-border); border-radius: 6px; background: var(--input-bg);
  padding: 6px 10px; display: flex; align-items: center; justify-content: space-between;
  min-width: 120px;
}
.wf-caret { color: var(--muted); font-size: 10px; }
.wf-checkbox { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; }
.wf-checkbox-box {
  width: 14px; height: 14px; border: 1.5px solid var(--btn-border); border-radius: 3px; flex-shrink: 0;
}
.wf-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; }
.wf-toggle-track {
  width: 34px; height: 18px; background: #d0d7e0; border-radius: 9px; position: relative; flex-shrink: 0;
}
.wf-toggle-thumb {
  width: 14px; height: 14px; background: #fff; border-radius: 50%;
  position: absolute; top: 2px; left: 2px; box-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.wf-radio { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; }
.wf-radio-dot {
  width: 14px; height: 14px; border: 1.5px solid var(--btn-border); border-radius: 50%; flex-shrink: 0;
}

/* ── Media ─────────────────────────────────────────────────────────── */
.wf-avatar {
  width: 36px; height: 36px; background: #c8d0dc; border-radius: 50%; flex-shrink: 0;
}
.wf-avatar-sm { width: 26px; height: 26px; }
.wf-image {
  background: #dde3ec; border-radius: 6px; min-height: 72px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 12px; width: 100%;
}
.wf-icon { color: var(--muted); font-size: 14px; display: inline-block; }

/* ── Data display ──────────────────────────────────────────────────── */
.wf-table { border: 1px solid var(--line); border-radius: 6px; overflow: hidden; width: 100%; }
.wf-table-header-row {
  display: flex; background: #f0f2f6; border-bottom: 1px solid var(--line);
}
.wf-table-row { display: flex; border-bottom: 1px solid #eef0f4; }
.wf-table-row:last-child { border-bottom: 0; }
.wf-table-cell {
  flex: 1; padding: 7px 10px; font-size: 12px; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.wf-table-header-row .wf-table-cell { font-weight: 600; color: var(--muted); font-size: 11px; }
.wf-list { display: flex; flex-direction: column; gap: 2px; }
.wf-list-item {
  padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
  background: var(--card-bg); font-size: 12px; display: flex; align-items: center; gap: 8px;
}
.wf-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.wf-grid-cell {
  border: 1px solid var(--line); border-radius: 6px; background: var(--card-bg);
  padding: 10px; font-size: 12px; text-align: center; color: var(--muted);
}
.wf-card {
  border: 1px solid var(--line); border-radius: 8px; background: var(--card-bg);
  padding: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px;
}
.wf-metric {
  border: 1px solid var(--line); border-radius: 8px; background: var(--metric-bg);
  padding: 12px 14px; min-width: 100px; flex: 1;
}
.wf-metric-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.wf-metric-value { font-size: 22px; font-weight: 700; }
.wf-badge {
  display: inline-block; background: var(--badge-bg); color: var(--badge-ink);
  border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 600;
}
.wf-tag {
  display: inline-block; background: #f0f4ff; color: #3b5bdb;
  border-radius: 4px; padding: 2px 7px; font-size: 11px;
}
.wf-tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
.wf-person-cell { display: flex; align-items: center; gap: 8px; }
.wf-pagination { display: flex; gap: 4px; align-items: center; }
.wf-timeline { display: flex; flex-direction: column; gap: 10px; padding: 8px 0; }
.wf-timeline-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.wf-timeline-dot {
  width: 10px; height: 10px; border: 2px solid var(--accent); border-radius: 50%; flex-shrink: 0;
}

/* ── Typography ────────────────────────────────────────────────────── */
.wf-title { margin: 0 0 6px; font-size: 16px; font-weight: 700; color: var(--ink); }
.wf-text { margin: 0 0 4px; font-size: 13px; color: var(--ink); }
.wf-caption { margin: 0 0 2px; font-size: 11px; color: var(--muted); }
.wf-label-text { font-size: 12px; font-weight: 600; }

/* ── Misc ──────────────────────────────────────────────────────────── */
.wf-divider { border: none; border-top: 1px solid var(--line); margin: 8px 0; }
.wf-optional { opacity: .55; }
.wf-section {
  display: flex; flex-direction: column; gap: 8px; padding: 10px;
  background: var(--panel); border-radius: 8px;
}
.wf-section-label {
  font-size: 10px; color: var(--muted); font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em;
}
.wf-section-bar {
  background: #f8fafc; border: 1px solid var(--line); border-radius: 6px;
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
}
.wf-generic {
  border: 1px dashed var(--line); border-radius: 6px;
  padding: 8px 10px; font-size: 12px; color: var(--muted); background: #fafbfc;
}
.wf-modal {
  border: 1px solid var(--line); border-radius: 10px; background: var(--panel);
  box-shadow: 0 4px 16px rgba(0,0,0,.12); max-width: 480px; margin: 12px auto;
}
.wf-modal-header { padding: 12px 16px; font-weight: 600; border-bottom: 1px solid var(--line); }
.wf-modal-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar" id="sidebar">
    <h1 class="brand">Wireframe</h1>
    <p class="sub">STN Viewer</p>
    <div id="nav"></div>
  </aside>
  <main class="main">
    <div class="toolbar-bar">
      <button class="icon-btn on" id="nav-toggle" title="네비게이션 패널 접기/펼치기">☰ Nav</button>
      <div class="title">
        <h2 id="doc-title"></h2>
        <p id="doc-path"></p>
      </div>
      <div class="controls">
        <!-- viewport presets -->
        <div class="seg" aria-label="Viewport">
          <button id="btn-mobile"  type="button">Mobile</button>
          <button id="btn-tablet"  type="button">Tablet</button>
          <button id="btn-desktop" type="button" class="active">Desktop</button>
          <button id="btn-full"    type="button">Full</button>
        </div>
        <!-- width slider -->
        <div class="width-ctrl">
          <input type="range" id="width-slider" min="320" max="1440" value="960" step="10">
          <span class="w-label" id="w-label">960px</span>
        </div>
        <!-- source panel toggle -->
        <button class="icon-btn on" id="source-toggle" title="소스 패널 접기/펼치기">⌗ STN</button>
      </div>
    </div>
    <div class="workspace-viewer" id="workspace">
      <section id="preview" class="preview">
        <div class="frame" id="frame" style="max-width:960px"></div>
      </section>
      <section class="source-panel" id="source-panel">
        <pre id="source"></pre>
      </section>
    </div>
  </main>
</div>
<script>
const docs = __DOCS_JSON__;

const app       = document.getElementById('app');
const sidebar   = document.getElementById('sidebar');
const workspace = document.getElementById('workspace');
const sourcePanel = document.getElementById('source-panel');
const frame     = document.getElementById('frame');
const source    = document.getElementById('source');
const title     = document.getElementById('doc-title');
const pathEl    = document.getElementById('doc-path');
const slider    = document.getElementById('width-slider');
const wLabel    = document.getElementById('w-label');

// ── Nav panel toggle ────────────────────────────────────────────────
let navOpen = true;
document.getElementById('nav-toggle').onclick = function() {
  navOpen = !navOpen;
  app.style.setProperty('--nav-w', navOpen ? '260px' : '0px');
  sidebar.style.padding = navOpen ? '' : '0';
  this.classList.toggle('on', navOpen);
};

// ── Source panel toggle ─────────────────────────────────────────────
let sourceOpen = true;
document.getElementById('source-toggle').onclick = function() {
  sourceOpen = !sourceOpen;
  sourcePanel.classList.toggle('hidden', !sourceOpen);
  workspace.classList.toggle('source-off', !sourceOpen);
  this.classList.toggle('on', sourceOpen);
};

// ── Frame width ─────────────────────────────────────────────────────
const PRESETS = { mobile: 390, tablet: 768, desktop: 960, full: 1440 };

function setWidth(px, activeId) {
  frame.style.maxWidth = px + 'px';
  slider.value = px;
  wLabel.textContent = px + 'px';
  ['btn-mobile','btn-tablet','btn-desktop','btn-full'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === activeId);
  });
}

document.getElementById('btn-mobile') .onclick = () => setWidth(390,  'btn-mobile');
document.getElementById('btn-tablet') .onclick = () => setWidth(768,  'btn-tablet');
document.getElementById('btn-desktop').onclick = () => setWidth(960,  'btn-desktop');
document.getElementById('btn-full')   .onclick = () => setWidth(1440, 'btn-full');

slider.oninput = () => {
  const w = parseInt(slider.value);
  frame.style.maxWidth = w + 'px';
  wLabel.textContent = w + 'px';
  ['btn-mobile','btn-tablet','btn-desktop','btn-full'].forEach(id =>
    document.getElementById(id).classList.remove('active')
  );
};

// ── Navigation ───────────────────────────────────────────────────────
const nav = document.getElementById('nav');

function renderNav() {
  nav.innerHTML = '';
  const labels = { global: 'Global', screen: 'Screens', component: 'Components' };
  for (const kind of ['global', 'screen', 'component']) {
    const items = docs.map((d, i) => [d, i]).filter(([d]) => d.kind === kind);
    if (!items.length) continue;
    const hdr = document.createElement('div');
    hdr.className = 'group-title';
    hdr.textContent = labels[kind];
    nav.appendChild(hdr);
    for (const [d, i] of items) {
      const btn = document.createElement('button');
      btn.className = 'nav-button';
      btn.type = 'button';
      btn.textContent = d.name;
      btn.onclick = () => select(i);
      btn.dataset.index = i;
      nav.appendChild(btn);
    }
  }
}

function select(index) {
  const doc = docs[index];
  title.textContent = doc ? doc.name : '—';
  pathEl.textContent = doc ? doc.path : '';
  frame.innerHTML = doc ? doc.html : '<div class="wf-empty">디자인 파일이 없습니다.</div>';
  source.textContent = doc ? doc.source : '';
  for (const btn of nav.querySelectorAll('.nav-button'))
    btn.classList.toggle('active', Number(btn.dataset.index) === index);
}

renderNav();
const firstScreen = docs.findIndex(d => d.kind === 'screen');
select(firstScreen >= 0 ? firstScreen : 0);
</script>
</body>
</html>
